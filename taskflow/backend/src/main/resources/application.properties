spring.application.name=taskflow-backend
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:taskflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
app.jwt.secret=taskflow-super-secret-key-for-jwt-2024-must-be-at-least-256-bits-long
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000
